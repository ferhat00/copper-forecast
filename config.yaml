eia:
  api_key: "YOUR_EIA_API_KEY"  # set EIA_API_KEY env var or replace this placeholder
  base_url: "https://api.eia.gov/v2"

fred:
  api_key: "YOUR_FRED_API_KEY"  # set FRED_API_KEY env var or replace this placeholder

data:
  start_date: "2015-01-01"
  end_date: null  # null means today
  fred_series:
    usd_index:    "DTWEXBGS"       # Trade Weighted US Dollar Index: Broad, Goods
    cpi:          "CPIAUCSL"       # Consumer Price Index (monthly, lagging)
    fed_funds:    "DFF"            # Federal Funds Effective Rate
    t10y2y:       "T10Y2Y"         # 10-Year minus 2-Year Treasury spread
    t5yie:        "T5YIE"          # 5-Year Breakeven Inflation Rate (daily)
    t10yie:       "T10YIE"         # 10-Year Breakeven Inflation Rate (daily)
    hy_spread:    "BAMLH0A0HYM2"  # ICE BofA US High Yield OAS (daily)
    indpro:       "INDPRO"         # Industrial Production Index (monthly)
    cap_util:     "TCU"            # Capacity Utilization: Total Index (monthly)
    unemployment: "UNRATE"         # Unemployment Rate (monthly)
    nfci:         "NFCI"           # Chicago Fed National Financial Conditions Index (weekly)
    ig_spread:    "BAMLC0A0CM"    # ICE BofA US Investment Grade OAS (daily)
  eia_series:
    crude_stocks:         "PET.WTTSTUS1.W"          # Weekly U.S. Ending Stocks of Crude Oil
    production:           "PET.WCRFPUS2.W"          # Weekly U.S. Crude Oil Production
    refinery_utilization: "PET.WPULEUS3.W"          # U.S. refinery utilization % of operable capacity
    nat_gas_stocks:       "NG.NW2_EPG0_SWO_R48_BCF.W"  # Natural gas storage lower-48 (BCF, weekly)
    indl_elec_sales:      "ELEC.SALES.US-IND.M"    # US industrial electricity retail sales (M kWh, monthly)
    comm_elec_sales:      "ELEC.SALES.US-COM.M"    # US commercial electricity retail sales (M kWh)
    total_elec_sales:     "ELEC.SALES.US-ALL.M"    # US total electricity retail sales (M kWh)
    total_elec_gen:       "ELEC.GEN.ALL-US-99.M"   # US total net electricity generation (k MWh)

alpha_vantage:
  api_key: "YOUR_ALPHA_VANTAGE_API_KEY"  # set ALPHA_VANTAGE_API_KEY env var or replace this placeholder
  base_url: "https://www.alphavantage.co/query"
  series:
    av_copper:        "COPPER"           # LME copper price — industrial demand composite
    av_natural_gas:   "NATURAL_GAS"     # Henry Hub spot (monthly, cross-check)
    av_brent:         "CRUDE_OIL_BRENT" # Brent crude $/bbl (monthly cross-check)
    # ── LME base metals (World Bank source, monthly) ─────────────────────────
    av_aluminum:      "ALUMINUM"        # LME aluminum $/mt — substitute metal / smelting cost signal
    av_zinc:          "ZINC"            # LME zinc $/mt — galvanising / construction demand
    av_nickel:        "NICKEL"          # LME nickel $/mt — battery metals / co-mined with Cu
    av_lead:          "LEAD"            # LME lead $/mt — battery / construction
    av_tin:           "TIN"             # LME tin $/mt — solder / electronics (PCB demand)
    av_iron_ore:      "IRON_ORE"        # Iron ore $/dmt — steel/construction activity
    av_coal:          "COAL"            # Australian thermal coal $/mt — smelter energy cost

cot:
  enabled: true  # CFTC Commitments of Traders — WTI speculative positioning (no API key)

market_tickers:
  # ── Currencies (USD vs commodity-relevant economies) ────────────────────────
  usd_index_yf: "DX-Y.NYB"    # US Dollar Index (ICE)
  eur_usd:      "EURUSD=X"    # Euro / USD
  gbp_usd:      "GBPUSD=X"    # British Pound / USD
  usd_cad:      "USDCAD=X"    # USD / Canadian Dollar (petrocurrency)
  usd_nok:      "USDNOK=X"    # USD / Norwegian Krone (petrocurrency)
  usd_rub:      "USDRUB=X"    # USD / Russian Ruble
  usd_cny:      "USDCNY=X"    # USD / Chinese Renminbi
  aud_usd:      "AUDUSD=X"    # Australian Dollar / USD (commodity currency)
  nzd_usd:      "NZDUSD=X"    # New Zealand Dollar / USD
  usd_chf:      "USDCHF=X"    # USD / Swiss Franc (safe-haven proxy)
  # ── Energy commodities ───────────────────────────────────────────────────────
  nat_gas:      "NG=F"        # Henry Hub Natural Gas Futures
  heating_oil:  "HO=F"        # Heating Oil Futures ($/gallon)
  # ── Macro demand proxies ─────────────────────────────────────────────────────
  sp500:        "^GSPC"       # S&P 500 — broad US economic health
  gold:         "GC=F"        # Gold Futures — inflation / risk-off proxy
  silver:       "SI=F"        # Silver Futures
  copper:       "HG=F"        # Copper Futures — global industrial demand
  vix:          "^VIX"        # CBOE Volatility Index — market fear gauge
  eem:          "EEM"         # iShares MSCI Emerging Markets ETF
  dbc:          "DBC"         # Invesco DB Commodity Index
  # ── Interest rates (yields) ─────────────────────────────────────────────────
  t3m_yield:    "^IRX"        # 13-Week (3-Month) Treasury Bill yield
  t5y_yield:    "^FVX"        # 5-Year Treasury Note yield
  t10y_yield:   "^TNX"        # 10-Year Treasury Note yield (global benchmark)
  t30y_yield:   "^TYX"        # 30-Year Treasury Bond yield
  # ── Commodity complex ────────────────────────────────────────────────────
  lumber:       "LBS=F"       # Lumber — construction activity proxy
  wheat:        "ZW=F"        # Wheat — agri commodities move with energy costs
  corn:         "ZC=F"        # Corn — ethanol blend demand proxy
  # ── Shipping / freight ───────────────────────────────────────────────────
  bdry:         "BDRY"        # Breakwave Dry Bulk Shipping ETF (BDI proxy)
  # ── Energy transition pressure ────────────────────────────────────────────
  icln:         "ICLN"        # iShares Global Clean Energy ETF
  lithium:      "LIT"         # Lithium ETF — EV adoption proxy
  tan:          "TAN"         # Invesco Solar ETF
  # ── Equity volatility term structure ──────────────────────────────────────
  vix3m:        "^VIX3M"      # 3-Month VIX — term structure vs spot VIX
